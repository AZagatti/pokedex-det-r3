version: 2
commands:
  lint:
    glob: '*.{ts,svelte,js,json}'
    run: npx oxlint {staged_files}
  format:
    glob: '*.{ts,svelte,js}'
    run: npx prettier --write {staged_files}
  test:
    glob: '*.{ts,svelte,js}'
    run: npm run test:unit -- --run
pre-commit:
  commands:
    lint:
      glob: 'src/**/*.{ts,svelte,js}'
      run: npx oxlint {staged_files}
    format:
      glob: 'src/**/*.{ts,svelte,js}'
      run: npx prettier --check {staged_files}
